eature extraction and Node2Vec embeddings. Preference evolution is guided by message-passing mechanisms and hierarchical graph modeling, enabling real-time adaptation to changing behaviors. Experimental evaluations demonstrated the algorithm's superior performance in various recommendation tasks, including social networks and content discovery. Key metrics such as Hit Rate (HR), Mean Reciprocal Rank (MRR), and Normalized Discounted Cumulative Gain (NDCG) consistently outperformed baseline methods across multiple datasets. The model's adaptability to dynamic environments allowed for contextually relevant and precise recommendations. The proposed algorithm represents an advancement in recommendation systems by bridging individual preferences and community influences. Its general-purpose design enables applications in diverse domains, including social graphs, personalized learning, and medical graphs. This work highlights the potential of integrating swarm intelligence with network dynamics to address complex optimization challenges in recommendation systems.", "authors": ["Abdelsadeq Elfergany", "Ammar Adl", "Mohammed Kayed"], "date": "2025-12-14", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.14752v1", "score": 3, "summary": ""}, {"title": "Time-Constrained Recommendations: Reinforcement Learning Strategies for E-Commerce", "abstract": "Unlike traditional recommendation tasks, finite user time budgets introduce a critical resource constraint, requiring the recommender system to balance item relevance and evaluation cost. For example, in a mobile shopping interface, users interact with recommendations by scrolling, where each scroll triggers a list of items called slate. Users incur an evaluation cost - time spent assessing item features before deciding to click. Highly relevant items having higher evaluation costs may not fit within the user's time budget, affecting engagement. In this position paper, our objective is to evaluate reinforcement learning algorithms that learn patterns in user preferences and time budgets simultaneously, crafting recommendations with higher engagement potential under resource constraints. Our experiments explore the use of reinforcement learning to recommend items for users using Alibaba's Personalized Re-ranking dataset supporting slate optimization in e-commerce contexts. Our contributions include (i) a unified formulation of time-constrained slate recommendation modeled as Markov Decision Processes (MDPs) with budget-aware utilities; (ii) a simulation framework to study policy behavior on re-ranking data; and (iii) empirical evidence that on-policy and off-policy control can improve performance under tight time budgets than traditional contextual bandit-based methods.", "authors": ["Sayak Chakrabarty", "Souradip Pal"], "date": "2025-12-13", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.13726v1", "score": 3, "summary": ""}, {"title": "TA-KAND: Two-stage Attention Triple Enhancement and U-KAN based Diffusion For Few-shot Knowledge Graph Completion", "abstract": "Knowledge Graphs have become fundamental infrastructure for applications such as intelligent question answering and recommender systems due to their expressive representation. Nevertheless, real-world knowledge is heterogeneous, leading to a pronounced long-tailed distribution over relations. Previous studies mainly based on metric matching or meta learning. However, they often overlook the distributional characteristics of positive and negative triple samples. In this paper, we propose a few-shot knowledge graph completion framework that integrates two-stage attention triple enhancer with U-KAN based diffusion model. Extensive experiments on two public datasets show significant advantages of our methods.", "authors": ["Xinyu Gao"], "date": "2025-12-13", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.12182v2", "score": 3, "summary": ""}, {"title": "xGR: Efficient Generative Recommendation Serving at Scale", "abstract": "Recommendation system delivers substantial economic benefits by providing personalized predictions. Generative recommendation (GR) integrates LLMs to enhance the understanding of long user-item sequences. Despite employing attention-based architectures, GR's workload differs markedly from that of LLM serving. GR typically processes long prompt while producing short, fixed-length outputs, yet the computational cost of each decode phase is especially high due to the large beam width. In addition, since the beam search involves a vast item space, the sorting overhead becomes particularly time-consuming. We propose xGR, a GR-oriented serving system that meets strict low-latency requirements under highconcurrency scenarios. First, xGR unifies the processing of prefill and decode phases through staged computation and separated KV cache. Second, xGR enables early sorting termination and mask-based item filtering with data structure reuse. Third, xGR reconstructs the overall pipeline to exploit multilevel overlap and multi-stream parallelism. Our experiments with real-world recommendation service datasets demonstrate that xGR achieves at least 3.49x throughput compared to the state-of-the-art baseline under strict latency constraints.", "authors": ["Qingxiao Sun", "Tongxuan Liu", "Shen Zhang", "Siyu Wu", "Peijun Yang", "Haotian Liang", "Menxin Li", "Xiaolong Ma", "Zhiwei Liang", "Ziyi Ren", "Minchao Zhang", "Xinyu Liu", "Ke Zhang", "Depei Qian", "Hailong Yang"], "date": "2025-12-12", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.11529v2", "score": 3, "summary": ""}, {"title": "Task-Specific Sparse Feature Masks for Molecular Toxicity Prediction with Chemical Language Models", "abstract": "Reliable in silico molecular toxicity prediction is a cornerstone of modern drug discovery, offering a scalable alternative to experimental screening. However, the black-box nature of state-of-the-art models remains a significant barrier to adoption, as high-stakes safety decisions demand verifiable structural insights alongside predictive performance. To address this, we propose a novel multi-task learning (MTL) framework designed to jointly enhance accuracy and interpretability. Our architecture integrates a shared chemical language model with task-specific attention modules. By imposing an L1 sparsity penalty on these modules, the framework is constrained to focus on a minimal set of salient molecular fragments for each distinct toxicity endpoint. The resulting framework is trained end-to-end and is readily adaptable to various transformer-based backbones. Evaluated on the ClinTox, SIDER, and Tox21 benchmark datasets, our approach consistently outperforms both single-task and standard MTL baselines. Crucially, the sparse attention weights provide chemically intuitive visualizations that reveal the specific fragments influencing predictions, thereby enhancing insight into the model's decision-making process.", "authors": ["Kwun Sy Lee", "Jiawei Chen", "Fuk Sheng Ford Chung", "Tianyu Zhao", "Zhenyuan Chen", "Debby D. Wang"], "date": "2025-12-12", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.11412v1", "score": 3, "summary": ""}, {"title": "Spectral entropy prior-guided deep feature fusion architecture for magnetic core loss", "abstract": "Accurate core loss modeling is critical for the design of high-efficiency power electronic systems. Traditional core loss modeling methods have limitations in prediction accuracy. To advance this field, the IEEE Power Electronics Society launched the MagNet Challenge in 2023, the first international competition focused on data-driven power electronics design methods, aiming to uncover complex loss patterns in magnetic components through a data-driven paradigm. Although purely data-driven models demonstrate strong fitting performance, their interpretability and cross-distribution generalization capabilities remain limited. To address these issues, this paper proposes a hybrid model, SEPI-TFPNet, which integrates empirical models with deep learning. The physical-prior submodule employs a spectral entropy discrimination mechanism to select the most suitable empirical model under different excitation waveforms. The data-driven submodule incorporates convolutional neural networks, multi-head attention mechanisms, and bidirectional long short-term memory networks to extract flux-density time-series features. An adaptive feature fusion module is introduced to improve multimodal feature interaction and integration. Using the MagNet dataset containing various magnetic materials, this paper evaluates the proposed method and compares it with 21 representative models from the 2023 challenge and three advanced methods from 2024-2025. The results show that the proposed method achieves improved modeling accuracy and robustness.", "authors": ["Cong Yao", "Chunye Gong", "Jin Zhang"], "date": "2025-12-12", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.11334v1", "score": 3, "summary": ""}, {"title": "FAIR: Focused Attention Is All You Need for Generative Recommendation", "abstract": "Recently, transformer-based generative recommendation has garnered significant attention for user behavior modeling. However, it often requires discretizing items into multi-code representations (e.g., typically four code tokens or more), which sharply increases the length of the original item sequence. This expansion poses challenges to transformer-based models for modeling user behavior sequences with inherent noises, since they tend to overallocate attention to irrelevant or noisy context. To mitigate this issue, we propose FAIR, the first generative recommendation framework with focused attention, which enhances attention scores to relevant context while suppressing those to irrelevant ones. Specifically, we propose (1) a focused attention mechanism integrated into the standard Transformer, which learns two separate sets of Q and K attention weights and computes their difference as the final attention scores to eliminate attention noise while focusing on relevant contexts; (2) a noise-robustness objective, which encourages the model to maintain stable attention patterns under stochastic perturbations, preventing undesirable shifts toward irrelevant context due to noise; and (3) a mutual information maximization objective, which guides the model to identify contexts that are most informative for next-item prediction. We validate the effectiveness of FAIR on four public benchmarks, demonstrating its superior performance compared to existing methods.", "authors": ["Longtao Xiao", "Haolin Zhang", "Guohao Cai", "Jieming Zhu", "Yifan Wang", "Heng Chang", "Zhenhua Dong", "Xiu Li", "Ruixuan Li"], "date": "2025-12-12", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.11254v2", "score": 3, "summary": ""}, {"title": "Inference Time Feature Injection: A Lightweight Approach for Real-Time Recommendation Freshness", "abstract": "Many recommender systems in long-form video streaming reply on batch-trained models and batch-updated features, where user features are updated daily and served statically throughout the day. While efficient, this approach fails to incorporate a user's most recent actions, often resulting in stale recommendations. In this work, we present a lightweight, model-agnostic approach for intra-day personalization that selectively injects recent watch history at inference time without requiring model retraining. Our approach selectively overrides stale user features at inference time using the recent watch history, allowing the system to adapt instantly to evolving preferences. By reducing the personalization feedback loop from daily to intra-day, we observed a statistically significant 0.47% increase in key user engagement metrics which ranked among the most substantial engagement gains observed in recent experimentation cycles. To our knowledge, this is the first published evidence that intra-day personalization can drive meaningful impact in long-form video streaming service, providing a compelling alternative to full real-time architectures where model retraining is required.", "authors": ["Qiang Chen", "Venkatesh Ganapati Hegde", "Hongfei Li"], "date": "2025-12-11", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.14734v1", "score": 3, "summary": ""}];
let filtered = [...PAPERS];

function applyFilters() {
  const q     = document.getElementById('searchBox').value.toLowerCase();
  const venue = document.getElementById('venueFilter').value;
  const year  = document.getElementById('yearFilter').value;
  const sort  = document.getElementById('sortBy').value;

  filtered = PAPERS.filter(p => {
    if (venue && p.venue !== venue) return false;
    if (year  && String(p.year) !== year) return false;
    if (q) {
      const hay = (p.title + ' ' + p.abstract + ' ' + (p.authors||[]).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sort === 'score')        filtered.sort((a,b) => (b.score-a.score)||(b.date||'').localeCompare(a.date||''));
  else if (sort==='date_desc') filtered.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  else                         filtered.sort((a,b) => (a.date||'').localeCompare(b.date||''));

  renderList();
}

function renderList() {
  const list  = document.getElementById('paperList');
  const empty = document.getElementById('emptyState');
  document.getElementById('countBadge').textContent = filtered.length + ' / ' + PAPERS.length + ' papers';

  if (!filtered.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';

  list.innerHTML = filtered.map((p, idx) => {
    const srcTag = p.source === 'arxiv'
      ? '<span class="tag tag-arxiv">arXiv</span>'
      : '<span class="tag tag-conf">Conference</span>';
    const vTag   = p.source !== 'arxiv' ? `<span class="tag tag-venue">${esc(p.venue)}</span>` : '';
    const yTag   = p.year ? `<span class="tag tag-year">${p.year}</span>` : '';
    const sTag   = `<span class="tag tag-score">score ${p.score}</span>`;

    const aiBtn  = p.summary
      ? `<button class="btn-summary" onclick="toggleSummary(${idx})">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
             <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
             <path d="M12 8v4l3 3"/>
           </svg>
           AI Summary
         </button>`
      : '';

    const titleHtml = p.url
      ? `<a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a>`
      : esc(p.title);

    const authors = p.authors || [];
    const authStr = authors.slice(0,5).join(', ') + (authors.length > 5 ? ` +${authors.length-5}` : '');

    const abst = p.abstract
      ? `<div class="card-abstract" id="abs-${idx}">${esc(p.abstract)}</div>
         <button class="expand-btn" onclick="toggleAbs(${idx})">Show more</button>`
      : '<div style="color:var(--muted);font-size:.8rem;margin-top:8px;font-style:italic">No abstract available</div>';

    let summaryPanel = '';
    if (p.summary) {
      const sentences = p.summary.replace(/\n/g,' ').split(/(?<=\.)\s+/).filter(s => s.trim());
      const sentHtml = sentences.map((s, i) =>
        `<span class="summary-sentence"><span class="s-num">${i+1}.</span>${esc(s.replace(/\.$/,''))}</span>`
      ).join('');
      summaryPanel = `<div class="summary-panel" id="sum-${idx}">${sentHtml}</div>`;
    }

    return `<div class="paper-card">
  <div class="card-header">
    <div class="card-title">${titleHtml}</div>
    <div class="tags">${srcTag}${vTag}${yTag}${sTag}${aiBtn}</div>
  </div>
  <div class="card-authors">${esc(authStr)}</div>
  ${abst}
  ${summaryPanel}
</div>`;
  }).join('');
}

function toggleSummary(idx) {
  const panel = document.getElementById('sum-' + idx);
  if (!panel) return;
  panel.classList.toggle('open');
}

function toggleAbs(idx) {
  const el  = document.getElementById('abs-' + idx);
  const btn = el.nextElementSibling;
  el.classList.toggle('expanded')
    ? btn.textContent = 'Show less'
    : btn.textContent = 'Show more';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

applyFilters();
</script>
</body>
</html>
