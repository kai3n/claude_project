<!DOCTYPE html>

<head>

<title>CTR/CVR RecSys Papers</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #252836;
    --border: #2e3347; --accent: #6c63ff; --accent2: #00d4aa;
    --text: #e2e8f0; --muted: #8892a4;
    --tag-arxiv: #1e3a5f; --tag-conf: #1e4a2e;
    --tag-arxiv-text: #60a5fa; --tag-conf-text: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border);
           padding: 18px 32px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.35rem; font-weight: 700; color: var(--accent);
              display: inline-flex; align-items: center; gap: 10px; }
  header .subtitle { color: var(--muted); font-size: 0.82rem; margin-top: 3px; }

  /* Controls */
  .controls { display: flex; flex-wrap: wrap; gap: 12px; padding: 16px 32px;
              background: var(--surface); border-bottom: 1px solid var(--border); }
  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
                     width: 16px; height: 16px; }
  input[type="search"] {
    width: 100%; padding: 9px 12px 9px 36px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.9rem; outline: none;
    transition: border-color .2s;
  }
  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--muted); }
  select {
    padding: 9px 14px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.9rem; cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--accent); }
  .count-badge { align-self: center; color: var(--muted); font-size: 0.82rem;
                 margin-left: auto; white-space: nowrap; }

  /* Container */
  .container { max-width: 1100px; margin: 0 auto; padding: 22px 32px; }

  /* Paper Card */
  .paper-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 22px; margin-bottom: 14px;
    transition: border-color .2s, transform .1s;
    animation: fadeIn .25s ease;
  }
  .paper-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  @keyframes fadeIn { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform:none; } }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-title { font-size: 1rem; font-weight: 600; line-height: 1.5; flex: 1; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }

  .tags { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; margin-top: 2px; align-items: center; }
  .tag { font-size: 0.7rem; font-weight: 600; padding: 3px 8px;
         border-radius: 20px; letter-spacing: .02em; white-space: nowrap; }
  .tag-arxiv { background: var(--tag-arxiv); color: var(--tag-arxiv-text); }
  .tag-conf  { background: var(--tag-conf);  color: var(--tag-conf-text);  }
  .tag-venue { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .tag-year  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .tag-score { background: #2d1f4a; color: #a78bfa; border: 1px solid #4c3888; }

  /* AI Summary button */
  .btn-summary {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; border: 1px solid var(--accent2);
    background: transparent; color: var(--accent2); font-size: 0.7rem; font-weight: 600;
    cursor: pointer; letter-spacing: .02em; white-space: nowrap;
    transition: background .15s, color .15s;
  }
  .btn-summary:hover { background: var(--accent2); color: #0f1117; }
  .btn-summary svg { width: 11px; height: 11px; flex-shrink: 0; }

  /* Inline summary panel */
  .summary-panel {
    display: none; margin-top: 12px;
    background: var(--surface2); border: 1px solid var(--accent2);
    border-radius: 8px; padding: 14px 16px;
    font-size: 0.87rem; line-height: 1.75; color: #cbd5e1;
    position: relative;
  }
  .summary-panel.open { display: block; animation: fadeIn .2s ease; }
  .summary-panel::before {
    content: '✦ AI Summary';
    display: block; font-size: 0.7rem; font-weight: 700; color: var(--accent2);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
  }
  .summary-sentence { display: block; padding: 2px 0; }
  .summary-sentence + .summary-sentence { margin-top: 4px; }
  .s-num { color: var(--accent2); font-weight: 700; margin-right: 4px; }

  .card-authors { margin-top: 7px; color: var(--muted); font-size: 0.82rem; }
  .card-abstract {
    margin-top: 10px; color: #94a3b8; font-size: 0.87rem; line-height: 1.65;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    cursor: pointer;
  }
  .card-abstract.expanded { -webkit-line-clamp: unset; }
  .expand-btn { margin-top: 5px; font-size: 0.78rem; color: var(--accent);
                cursor: pointer; background: none; border: none; padding: 0; }
  .expand-btn:hover { text-decoration: underline; }

  /* Empty state */
  .empty { text-align: center; padding: 70px 20px; color: var(--muted); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>

<script>
const PAPERS = [{"title": "Modeling Cascaded Delay Feedback for Online Net Conversion Rate Prediction: Benchmark, Insights and Solutions", "abstract": "In industrial recommender systems, conversion rate (CVR) is widely used for traffic allocation, but it fails to fully reflect recommendation effectiveness because it ignores refund behavior. To better capture true user satisfaction and business value, net conversion rate (NetCVR), defined as the probability that a clicked item is purchased and not refunded, has been proposed.Unlike CVR, NetCVR prediction involves a more complex multi-stage cascaded delayed feedback process. The two cascaded delays from click to conversion and from conversion to refund have opposite effects, making traditional CVR modeling methods inapplicable. Moreover, the lack of open-source datasets and online continuous training schemes further hinders progress in this area.To address these challenges, we introduce CASCADE (Cascaded Sequences of Conversion and Delayed Refund), the first large-scale open dataset derived from the Taobao app for online continuous NetCVR prediction. Through an in-depth analysis of CASCADE, we identify three key insights: (1) NetCVR exhibits strong temporal dynamics, necessitating online continuous modeling; (2) cascaded modeling of CVR and refund rate outperforms direct NetCVR modeling; and (3) delay time, which correlates with both CVR and refund rate, is an important feature for NetCVR prediction.Based on these insights, we propose TESLA, a continuous NetCVR modeling framework featuring a CVR-refund-rate cascaded architecture, stage-wise debiasing, and a delay-time-aware ranking loss. Extensive experiments demonstrate that TESLA consistently outperforms state-of-the-art methods on CASCADE, achieving absolute improvements of 12.41 percent in RI-AUC and 14.94 percent in RI-PRAUC on NetCVR prediction. The code and dataset are publicly available at https://github.com/alimama-tech/NetCVR.", "authors": ["Mingxuan Luo", "Guipeng Xv", "Sishuo Chen", "Xinyu Li", "Li Zhang", "Zhangming Chan", "Xiang-Rong Sheng", "Han Zhu", "Jian Xu", "Bo Zheng", "Chen Lin"], "date": "2026-01-27", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2601.19965v2", "score": 25, "summary": "This paper addresses net conversion rate (NetCVR) prediction—predicting whether a user will complete a purchase and not refund it—which involves cascaded delayed feedback from click→conversion→refund stages, requiring online continuous learning rather than offline batch methods. The authors propose TESLA, an online continuous method featuring a CVR-RFR cascaded architecture with shared-private parameters, stage-wise importance weighting for debiasing, and a delay-aware ranking loss that weights positive samples by conversion speed and samples reliable negatives based on predicted confidence. Experiments on CASCADE, the first large-scale open NetCVR dataset derived from Taobao, demonstrate that TESLA achieves 12.41% absolute improvement in RI-AUC and 14.94% in RI-PRAUC over state-of-the-art baselines, validating that cascaded modeling with delay-time signals substantially outperforms direct NetCVR modeling."}, {"title": "From Feature Interaction to Feature Generation: A Generative Paradigm of CTR Prediction Models", "abstract": "Click-Through Rate (CTR) prediction, a core task in recommendation systems, aims to estimate the probability of users clicking on items. Existing models predominantly follow a discriminative paradigm, which relies heavily on explicit interactions between raw ID embeddings. However, this paradigm inherently renders them susceptible to two critical issues: embedding dimensional collapse and information redundancy, stemming from the over-reliance on feature interactions \\emph{over raw ID embeddings}. To address these limitations, we propose a novel \\emph{Supervised Feature Generation (SFG)} framework, \\emph{shifting the paradigm from discriminative ``feature interaction\" to generative ``feature generation\"}. Specifically, SFG comprises two key components: an \\emph{Encoder} that constructs hidden embeddings for each feature, and a \\emph{Decoder} tasked with regenerating the feature embeddings of all features from these hidden representations. Unlike existing generative approaches that adopt self-supervised losses, we introduce a supervised loss to utilize the supervised signal, \\ie, click or not, in the CTR prediction task. This framework exhibits strong generalizability: it can be seamlessly integrated with most existing CTR models, reformulating them under the generative paradigm. Extensive experiments demonstrate that SFG consistently mitigates embedding collapse and reduces information redundancy, while yielding substantial performance gains across various datasets and base models. The code is available at https://github.com/USTC-StarTeam/GE4Rec.", "authors": ["Mingjia Yin", "Junwei Pan", "Hao Wang", "Ximei Wang", "Shangyu Zhang", "Jie Jiang", "Defu Lian", "Enhong Chen"], "date": "2025-12-16", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.14041v1", "score": 22, "summary": "Existing Click-Through Rate (CTR) prediction models suffer from embedding dimensional collapse and information redundancy due to their discriminative paradigm that relies on explicit feature interactions between raw ID embeddings. The authors propose Supervised Feature Generation (SFG), a novel framework that shifts from discriminative \"feature interaction\" to generative \"feature generation\" using an Encoder-Decoder architecture that takes all features as input to generate new feature representations, optimized with a supervised loss on the CTR label rather than self-supervised signals. Experiments demonstrate consistent improvements across multiple CTR models (averaging 0.272% AUC lift and 0.435% Logloss reduction) with substantial real-world impact (2.68% GMV lift in production deployment), while analysis shows the framework mitigates embedding collapse and reduces information redundancy through decorrelated representations."}, {"title": "IDProxy: Cold-Start CTR Prediction for Ads and Recommendation at Xiaohongshu with Multimodal LLMs", "abstract": "Click-through rate (CTR) models in advertising and recommendation systems rely heavily on item ID embeddings, which struggle in item cold-start settings. We present IDProxy, a solution that leverages multimodal large language models (MLLMs) to generate proxy embeddings from rich content signals, enabling effective CTR prediction for new items without usage data. These proxies are explicitly aligned with the existing ID embedding space and are optimized end-to-end under CTR objectives together with the ranking model, allowing seamless integration into existing large-scale ranking pipelines. Offline experiments and online A/B tests demonstrate the effectiveness of IDProxy, which has been successfully deployed in both Content Feed and Display Ads features of Xiaohongshu's Explore Feed, serving hundreds of millions of users daily.", "authors": ["Yubin Zhang", "Haiming Xu", "Guillaume Salha-Galvan", "Ruiyan Han", "Feiyang Xiao", "Yanhua Huang", "Li Lin", "Yang Luo", "Yao Hu"], "date": "2026-03-02", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2603.01590v1", "score": 21, "summary": "This paper addresses the cold-start item problem in CTR prediction for recommendation and advertising systems by proposing IDProxy, which uses multimodal LLMs to generate proxy embeddings from content signals that are explicitly aligned with production ID embedding spaces. IDProxy employs a coarse-to-fine two-stage approach: Stage 1 uses contrastive learning to align MLLM-derived content embeddings with existing ID embeddings, while Stage 2 refines these proxies via hierarchical representation partitioning and lightweight adaptors, optimizing them end-to-end with the CTR ranking model to reuse its structural priors. Offline experiments demonstrate substantial improvements (0.14% AUC gain overall, 0.24-0.32% for new items), and online A/B tests on Xiaohongshu's Explore Feed show consistent gains across business metrics (0.5% engagement lift for Content Feed, 1.93% advertiser value improvement for Display Ads), with the system successfully deployed serving hundreds of millions of users."}, {"title": "CADET: Context-Conditioned Ads CTR Prediction With a Decoder-Only Transformer", "abstract": "Click-through rate (CTR) prediction is fundamental to online advertising systems. While Deep Learning Recommendation Models (DLRMs) with explicit feature interactions have long dominated this domain, recent advances in generative recommenders have shown promising results in content recommendation. However, adapting these transformer-based architectures to ads CTR prediction still presents unique challenges, including handling post-scoring contextual signals, maintaining offline-online consistency, and scaling to industrial workloads. We present CADET (Context-Conditioned Ads Decoder-Only Transformer), an end-to-end decoder-only transformer for ads CTR prediction deployed at LinkedIn. Our approach introduces several key innovations: (1) a context-conditioned decoding architecture with multi-tower prediction heads that explicitly model post-scoring signals such as ad position, resolving the chicken-and-egg problem between predicted CTR and ranking; (2) a self-gated attention mechanism that stabilizes training by adaptively regulating information flow at both representation and interaction levels; (3) a timestamp-based variant of Rotary Position Embedding (RoPE) that captures temporal relationships across timescales from seconds to months; (4) session masking strategies that prevent the model from learning dependencies on unavailable in-session events, addressing train-serve skew; and (5) production engineering techniques including tensor packing, sequence chunking, and custom Flash Attention kernels that enable efficient training and serving at scale. In online A/B testing, CADET achieves a 11.04\\% CTR lift compared to the production LiRank baseline model, a hybrid ensemble of DCNv2 and sequential encoders. The system has been successfully deployed on LinkedIn's advertising platform, serving the main traffic for homefeed sponsored updates.", "authors": ["David Pardoe", "Neil Daftary", "Miro Furtado", "Aditya Aiyer", "Yu Wang", "Liuqing Li", "Tao Song", "Lars Hertel", "Young Jin Yun", "Senthil Radhakrishnan", "Zhiwei Wang", "Tommy Li", "Khai Tran", "Ananth Nagarajan", "Ali Naqvi", "Yue Zhang", "Renpeng Fang", "Avi Romascanu", "Arjun Kulothungun", "Deepak Kumar", "Praneeth Boda", "Fedor Borisyuk", "Ruoyan Wang"], "date": "2026-02-11", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.11410v1", "score": 20, "summary": "CADET addresses the challenge of adapting decoder-only transformers to production-scale ads CTR prediction by handling post-scoring contextual signals (e.g., ad position), maintaining offline-online consistency, and enabling efficient industrial-scale inference. The approach introduces a context-conditioned decoding architecture with multi-tower prediction heads that resolve ranking dependencies without iterative re-scoring, self-gated attention for training stability, timestamp-based RoPE for temporal modeling, session-aware masking to prevent train-serve skew, and production optimizations including tensor packing, sequence chunking, and custom Flash Attention kernels. In online A/B testing on LinkedIn's advertising platform, CADET achieves an 11.04% CTR lift over the production LiRank baseline while simplifying the engineering stack from a hybrid ensemble to a unified end-to-end transformer model."}, {"title": "GenCI: Generative Modeling of User Interest Shift via Cohort-based Intent Learning for CTR Prediction", "abstract": "Click-through rate (CTR) prediction plays a pivotal role in online advertising and recommender systems. Despite notable progress in modeling user preferences from historical behaviors, two key challenges persist. First, exsiting discriminative paradigms focus on matching candidates to user history, often overfitting to historically dominant features and failing to adapt to rapid interest shifts. Second, a critical information chasm emerges from the point-wise ranking paradigm. By scoring each candidate in isolation, CTR models discard the rich contextual signal implied by the recalled set as a whole, leading to a misalignment where long-term preferences often override the user's immediate, evolving intent. To address these issues, we propose GenCI, a generative user intent framework that leverages semantic interest cohorts to model dynamic user preferences for CTR prediction. The framework first employs a generative model, trained with a next-item prediction (NTP) objective, to proactively produce candidate interest cohorts. These cohorts serve as explicit, candidate-agnostic representations of a user's immediate intent. A hierarchical candidate-aware network then injects this rich contextual signal into the ranking stage, refining them with cross-attention to align with both user history and the target item. The entire model is trained end-to-end, creating a more aligned and effective CTR prediction pipeline. Extensive experiments on three widely used datasets demonstrate the effectiveness of our approach.", "authors": ["Kesha Ou", "Zhen Tian", "Wayne Xin Zhao", "Hongyu Lu", "Ji-Rong Wen"], "date": "2026-01-26", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2601.18251v1", "score": 20, "summary": "GenCI addresses the dual challenge of capturing dynamic user interest shifts and maintaining consistency between recall and ranking stages in CTR prediction by proposing that discriminative models overfit to historical patterns while point-wise ranking ignores the contextual signal of recalled candidate sets. The approach employs a generative paradigm using next-item prediction with hierarchical quantization to produce semantic interest cohorts representing immediate user intent, which are then refined through hierarchical candidate-aware attention mechanisms that align cohorts with both user history and target items before fusion with long-term preferences for final CTR estimation. Extensive experiments on MovieLens, Amazon-Fashion, and Amazon-Instrument datasets demonstrate that GenCI achieves state-of-the-art performance with 10.82%, 10.29%, and 9.92% relative improvements respectively over baselines, with ablations confirming the critical contributions of short-term intent modeling, long-term intent preservation, self-supervised regularization, and the NTP objective for effective recall-ranking consistency."}, {"title": "EST: Towards Efficient Scaling Laws in Click-Through Rate Prediction via Unified Modeling", "abstract": "Efficiently scaling industrial Click-Through Rate (CTR) prediction has recently attracted significant research attention. Existing approaches typically employ early aggregation of user behaviors to maintain efficiency. However, such non-unified or partially unified modeling creates an information bottleneck by discarding fine-grained, token-level signals essential for unlocking scaling gains. In this work, we revisit the fundamental distinctions between CTR prediction and Large Language Models (LLMs), identifying two critical properties: the asymmetry in information density between behavioral and non-behavioral features, and the modality-specific priors of content-rich signals. Accordingly, we propose the Efficiently Scalable Transformer (EST), which achieves fully unified modeling by processing all raw inputs in a single sequence without lossy aggregation. EST integrates two modules: Lightweight Cross-Attention (LCA), which prunes redundant self-interactions to focus on high-impact cross-feature dependencies, and Content Sparse Attention (CSA), which utilizes content similarity to dynamically select high-signal behaviors. Extensive experiments show that EST exhibits a stable and efficient power-law scaling relationship, enabling predictable performance gains with model scale. Deployed on Taobao's display advertising platform, EST significantly outperforms production baselines, delivering a 3.27\\% RPM (Revenue Per Mile) increase and a 1.22\\% CTR lift, establishing a practical pathway for scalable industrial CTR prediction models.", "authors": ["Mingyang Liu", "Yong Bai", "Zhangming Chan", "Sishuo Chen", "Xiang-Rong Sheng", "Han Zhu", "Jian Xu", "Xinyang Chen"], "date": "2026-02-11", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.10811v1", "score": 19, "summary": "This paper proposes EST (Efficiently Scalable Transformer), a unified transformer architecture for industrial CTR prediction that identifies two key distinctions from LLMs—asymmetry in information density between behavioral and non-behavioral features, and modality-specific priors in content signals—to design domain-specific architectural components. EST introduces Lightweight Cross-Attention (LCA) to prioritize high-signal interactions between non-behavioral queries and behavioral sequences while pruning redundant behavior-to-behavior interactions, and Content Sparse Attention (CSA) that leverages pre-trained content similarity for efficient intra-sequence modeling, enabling fully unified input processing without lossy early aggregation. Extensive experiments on Taobao's display advertising platform demonstrate that EST exhibits stable power-law scaling with consistent performance improvements across model capacity and compute budget, achieving 3.27% RPM and 1.22% CTR gains in online A/B testing while maintaining comparable computational overhead to existing methods."}, {"title": "No One Left Behind: How to Exploit the Incomplete and Skewed Multi-Label Data for Conversion Rate Prediction", "abstract": "In most real-world online advertising systems, advertisers typically have diverse customer acquisition goals. A common solution is to use multi-task learning (MTL) to train a unified model on post-click data to estimate the conversion rate (CVR) for these diverse targets. In practice, CVR prediction often encounters missing conversion data as many advertisers submit only a subset of user conversion actions due to privacy or other constraints, making the labels of multi-task data incomplete. If the model is trained on all available samples where advertisers submit user conversion actions, it may struggle when deployed to serve a subset of advertisers targeting specific conversion actions, as the training and deployment data distributions are mismatched. While considerable MTL efforts have been made, a long-standing challenge is how to effectively train a unified model with the incomplete and skewed multi-label data. In this paper, we propose a fine-grained Knowledge transfer framework for Asymmetric Multi-Label data (KAML). We introduce an attribution-driven masking strategy (ADM) to better utilize data with asymmetric multi-label data in training. However, the more relaxed masking in ADM is a double-edged sword: it provides additional training signals but also introduces noise due to skewed data. To address this, we propose a hierarchical knowledge extraction mechanism (HKE) to model the sample discrepancy within the target task tower. Finally, to maximize the utility of unlabeled samples, we incorporate ranking loss strategy to further enhance our model. The effectiveness of KAML has been demonstrated through comprehensive evaluations on offline industry datasets and online A/B tests, which show significant performance improvements over existing MTL baselines.", "authors": ["Qinglin Jia", "Zhaocheng Du", "Chuhan Wu", "Huifeng Guo", "Ruiming Tang", "Shuting Shi", "Muyu Zhang"], "date": "2025-12-15", "year": 2025, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2512.13300v1", "score": 19, "summary": "This paper addresses the challenge of training multi-task learning (MTL) models for conversion rate (CVR) prediction when advertisers submit only partial conversion labels, creating incomplete and skewed multi-label data where a label of 0 may represent either a true negative or an unobserved conversion. KAML proposes three key innovations: (1) Attribution-Driven Masking (ADM) that identifies reliable training signals based on historical advertiser submission patterns, (2) Hierarchical Knowledge Extraction (HKE) that models distribution discrepancies between samples from advertisers targeting a specific conversion and samples from other advertisers, and (3) Ranking-based Label Utilization (RLU) that leverages unlabeled samples through pairwise ranking loss. Experiments on industrial and public datasets demonstrate consistent improvements, with online A/B testing on Huawei's advertising platform achieving 12.11% RPM and 0.92% CVR improvements over existing MTL baselines."}, {"title": "Delayed Feedback Modeling for Post-Click Gross Merchandise Volume Prediction: Benchmark, Insights and Approaches", "abstract": "The prediction objectives of online advertisement ranking models are evolving from probabilistic metrics like conversion rate (CVR) to numerical business metrics like post-click gross merchandise volume (GMV). Unlike the well-studied delayed feedback problem in CVR prediction, delayed feedback modeling for GMV prediction remains unexplored and poses greater challenges, as GMV is a continuous target, and a single click can lead to multiple purchases that cumulatively form the label. To bridge the research gap, we establish TRACE, a GMV prediction benchmark containing complete transaction sequences rising from each user click, which supports delayed feedback modeling in an online streaming manner. Our analysis and exploratory experiments on TRACE reveal two key insights: (1) the rapid evolution of the GMV label distribution necessitates modeling delayed feedback under online streaming training; (2) the label distribution of repurchase samples substantially differs from that of single-purchase samples, highlighting the need for separate modeling. Motivated by these findings, we propose RepurchasE-Aware Dual-branch prEdictoR (READER), a novel GMV modeling paradigm that selectively activates expert parameters according to repurchase predictions produced by a router. Moreover, READER dynamically calibrates the regression target to mitigate under-estimation caused by incomplete labels. Experimental results show that READER yields superior performance on TRACE over baselines, achieving a 2.19% improvement in terms of accuracy. We believe that our study will open up a new avenue for studying online delayed feedback modeling for GMV prediction, and our TRACE benchmark with the gathered insights will facilitate future research and application in this promising direction. Our code and dataset are available at https://github.com/alimama-tech/OnlineGMV .", "authors": ["Xinyu Li", "Sishuo Chen", "Guipeng Xv", "Li Zhang", "Mingxuan Luo", "Zhangming Chan", "Xiang-Rong Sheng", "Han Zhu", "Jian Xu", "Chen Lin"], "date": "2026-01-28", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2601.20307v1", "score": 18, "summary": "This paper introduces TRACE, a benchmark dataset for post-click GMV prediction with delayed feedback, revealing that online streaming training and separate modeling for single-purchase versus repurchase samples significantly improve performance. The authors propose READER, a repurchase-aware dual-branch predictor with a router that selectively activates expert parameters and includes label calibration and partial label unlearning modules to mitigate bias from incomplete labels during online training. Experimental results on TRACE demonstrate that READER achieves 2.19% improvement in accuracy and 0.86% improvement in AUC compared to strong baselines, with ablation studies validating the effectiveness of the proposed architectural and debiasing components."}, {"title": "Jointly Optimizing Debiased CTR and Uplift for Coupons Marketing: A Unified Causal Framework", "abstract": "In online advertising, marketing interventions such as coupons introduce significant confounding bias into Click-Through Rate (CTR) prediction. Observed clicks reflect a mixture of users' intrinsic preferences and the uplift induced by these interventions. This causes conventional models to miscalibrate base CTRs, which distorts downstream ranking and billing decisions. Furthermore, marketing interventions often operate as multi-valued treatments with varying magnitudes, introducing additional complexity to CTR prediction.   To address these issues, we propose the \\textbf{Uni}fied \\textbf{M}ulti-\\textbf{V}alued \\textbf{T}reatment Network (UniMVT). Specifically, UniMVT disentangles confounding factors from treatment-sensitive representations, enabling a full-space counterfactual inference module to jointly reconstruct the debiased base CTR and intensity-response curves. To handle the complexity of multi-valued treatments, UniMVT employs an auxiliary intensity estimation task to capture treatment propensities and devise a unit uplift objective that normalizes the intervention effect. This ensures comparable estimation across the continuous coupon-value spectrum. UniMVT simultaneously achieves debiased CTR prediction for accurate system calibration and precise uplift estimation for incentive allocation. Extensive experiments on synthetic and industrial datasets demonstrate UniMVT's superiority in both predictive accuracy and calibration. Furthermore, real-world A/B tests confirm that UniMVT significantly improves business metrics through more effective coupon distribution.", "authors": ["Siyun Yang", "Shixiao Yang", "Jian Wang", "Di Fan", "Kehe Cai", "Haoyan Fu", "Jiaming Zhang", "Wenjin Wu", "Peng Jiang"], "date": "2026-02-13", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.12972v1", "score": 14, "summary": "This paper addresses the problem of confounding bias in Click-Through Rate (CTR) prediction when marketing interventions like coupons are present, where observed clicks reflect both intrinsic user preferences and treatment effects, by proposing UniMVT (Unified Multi-Valued Treatment Network), which disentangles confounding factors from treatment-sensitive representations using a Mixture-of-Experts architecture and jointly reconstructs debiased base CTR and intensity-response curves through full-space counterfactual inference. Extensive experiments on synthetic and industrial datasets demonstrate that UniMVT achieves superior performance in both base CTR prediction (AUC and LogLoss) and unit uplift estimation (CS-AUUC and CS-Qini), with online A/B tests on the Kuaishou platform confirming significant business improvements, including 17.2% revenue gain in coupon scenarios compared to treatment-agnostic baselines."}, {"title": "Compress, Cross and Scale: Multi-Level Compression Cross Networks for Efficient Scaling in Recommender Systems", "abstract": "Modeling high-order feature interactions efficiently is a central challenge in click-through rate and conversion rate prediction. Modern industrial recommender systems are predominantly built upon deep learning recommendation models, where the interaction backbone plays a critical role in determining both predictive performance and system efficiency. However, existing interaction modules often struggle to simultaneously achieve strong interaction capacity, high computational efficiency, and good scalability, resulting in limited ROI when models are scaled under strict production constraints. In this work, we propose MLCC, a structured feature interaction architecture that organizes feature crosses through hierarchical compression and dynamic composition, which can efficiently capture high-order feature dependencies while maintaining favorable computational complexity. We further introduce MC-MLCC, a Multi-Channel extension that decomposes feature interactions into parallel subspaces, enabling efficient horizontal scaling with improved representation capacity and significantly reduced parameter growth. Extensive experiments on three public benchmarks and a large-scale industrial dataset show that our proposed models consistently outperform strong DLRM-style baselines by up to 0.52 AUC, while reducing model parameters and FLOPs by up to 26$\\times$ under comparable performance. Comprehensive scaling analyses demonstrate stable and predictable scaling behavior across embedding dimension, head number, and channel count, with channel-based scaling achieving substantially better efficiency than conventional embedding inflation. Finally, online A/B testing on a real-world advertising platform validates the practical effectiveness of our approach, which has been widely adopted in Bilibili advertising system under strict latency and resource constraints.", "authors": ["Heng Yu", "Xiangjun Zhou", "Jie Xia", "Heng Zhao", "Anxin Wu", "Yu Zhao", "Dongying Kong"], "date": "2026-02-12", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.12041v1", "score": 13, "summary": "Embedding high-order feature interactions efficiently in industrial recommendation systems remains challenging, as existing interaction modules struggle to simultaneously achieve strong expressiveness, computational efficiency, and scalability under production constraints. This paper proposes Multi-Level Compression Cross (MLCC), a structured feature interaction architecture that combines hierarchical compression with dynamic cross modeling via a unified \"Compress–Cross–Scale\" paradigm, and extends it to MC-MLCC with multi-channel parallel subspaces for efficient horizontal scaling beyond embedding inflation. Extensive experiments across three public benchmarks and a large-scale industrial dataset demonstrate that MLCC and MC-MLCC consistently outperform DLRM-style baselines by up to 0.52% AUC while reducing parameters and FLOPs by up to 26×, with comprehensive scaling analyses and online A/B testing validating channel-based scaling's superior return-on-investment compared to traditional embedding expansion."}, {"title": "GAP-Net: Calibrating User Intent via Gated Adaptive Progressive Learning for CTR Prediction", "abstract": "Sequential user behavior modeling is pivotal for Click-Through Rate (CTR) prediction yet is hindered by three intrinsic bottlenecks: (1) the \"Attention Sink\" phenomenon, where standard Softmax compels the model to allocate probability mass to noisy behaviors; (2) the Static Query Assumption, which overlooks dynamic shifts in user intent driven by real-time contexts; and (3) Rigid View Aggregation, which fails to adaptively weight heterogeneous temporal signals according to the decision context. To bridge these gaps, we propose GAP-Net (Gated Adaptive Progressive Network), a unified framework establishing a \"Triple Gating\" architecture to progressively refine information from micro-level features to macro-level views. GAP-Net operates through three integrated mechanisms: (1) Adaptive Sparse-Gated Attention (ASGA) employs micro-level gating to enforce sparsity, effectively suppressing massive noise activations; (2) Gated Cascading Query Calibration (GCQC) dynamically aligns user intent by bridging real-time triggers and long-term memories via a meso-level cascading channel; and (3) Context-Gated Denoising Fusion (CGDF) performs macro-level modulation to orchestrate the aggregation of multi-view sequences. Extensive experiments on industrial datasets demonstrate that GAP-Net achieves substantial improvements over state-of-the-art baselines, exhibiting superior robustness against interaction noise and intent drift.", "authors": ["Shenqiang Ke", "Jianxiong Wei", "Qingsong Hua"], "date": "2026-01-12", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2601.07613v2", "score": 12, "summary": "GAP-Net addresses three fundamental bottlenecks in sequential CTR prediction: the \"Attention Sink\" phenomenon where softmax forces probability mass allocation to noisy behaviors, the static query assumption that overlooks dynamic user intent shifts, and rigid view aggregation that fails to adaptively weight heterogeneous temporal signals. The proposed GAP-Net implements a \"Triple Gating\" architecture comprising Adaptive Sparse-Gated Attention (ASGA) for micro-level feature denoising, Gated Cascading Query Calibration (GCQC) for meso-level dynamic intent refinement, and Context-Gated Denoising Fusion (CGDF) for macro-level adaptive view modulation. Extensive experiments on industrial datasets (XMart and KuaiVideo) demonstrate consistent improvements across all baselines with AUC gains up to +1.69%, enhanced robustness against interaction noise, and validated business impact through online A/B testing showing +0.73% GMV lift and +0.57% CVR improvement on Meituan's platform."}, {"title": "MAC: A Conversion Rate Prediction Benchmark Featuring Labels Under Multiple Attribution Mechanisms", "abstract": "Multi-attribution learning (MAL), which enhances model performance by learning from conversion labels yielded by multiple attribution mechanisms, has emerged as a promising learning paradigm for conversion rate (CVR) prediction. However, the conversion labels in public CVR datasets are generated by a single attribution mechanism, hindering the development of MAL approaches.   To address this data gap, we establish the Multi-Attribution Benchmark (MAC), the first public CVR dataset featuring labels from multiple attribution mechanisms. Besides, to promote reproducible research on MAL, we develop PyMAL, an open-source library covering a wide array of baseline methods. We conduct comprehensive experimental analyses on MAC and reveal three key insights: (1) MAL brings consistent performance gains across different attribution settings, especially for users featuring long conversion paths. (2) The performance growth scales up with objective complexity in most settings; however, when predicting first-click conversion targets, simply adding auxiliary objectives is counterproductive, underscoring the necessity of careful selection of auxiliary objectives. (3) Two architectural design principles are paramount: first, to fully learn the multi-attribution knowledge, and second, to fully leverage this knowledge to serve the main task. Motivated by these findings, we propose Mixture of Asymmetric Experts (MoAE), an effective MAL approach incorporating multi-attribution knowledge learning and main task-centric knowledge utilization. Experiments on MAC show that MoAE substantially surpasses the existing state-of-the-art MAL method. We believe that our benchmark and insights will foster future research in the MAL field. Our MAC benchmark and the PyMAL algorithm library are publicly available at https://github.com/alimama-tech/PyMAL.", "authors": ["Jinqi Wu", "Sishuo Chen", "Zhangming Chan", "Yong Bai", "Lei Zhang", "Sheng Chen", "Chenghuan Hou", "Xiang-Rong Sheng", "Han Zhu", "Jian Xu", "Bo Zheng", "Chaoyou Fu"], "date": "2026-03-02", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2603.02184v1", "score": 11, "summary": "This paper introduces MAC, the first public conversion rate prediction benchmark with labels from multiple attribution mechanisms (last-click, first-click, linear, and data-driven attribution), addressing a critical data bottleneck that has prevented systematic research on multi-attribution learning (MAL) in CVR prediction. The authors conduct comprehensive experiments using their PyMAL library to evaluate MAL methods and identify two key architectural design principles: (1) fully learning multi-attribution knowledge through mixture-of-experts structures, and (2) fully leveraging this knowledge in a main-task-prioritized manner through asymmetric knowledge transfer. Based on these insights, they propose Mixture of Asymmetric Experts (MoAE), which combines an MoE backbone for comprehensive multi-attribution knowledge learning with a main-task-centric transfer module, achieving up to 0.92 percentage points improvement in GAUC over existing state-of-the-art methods and showing particular gains for users with complex conversion journeys."}, {"title": "RQ-GMM: Residual Quantized Gaussian Mixture Model for Multimodal Semantic Discretization in CTR Prediction", "abstract": "Multimodal content is crucial for click-through rate (CTR) prediction. However, directly incorporating continuous embeddings from pre-trained models into CTR models yields suboptimal results due to misaligned optimization objectives and convergence speed inconsistency during joint training. Discretizing embeddings into semantic IDs before feeding them into CTR models offers a more effective solution, yet existing methods suffer from limited codebook utilization, reconstruction accuracy, and semantic discriminability. We propose RQ-GMM (Residual Quantized Gaussian Mixture Model), which introduces probabilistic modeling to better capture the statistical structure of multimodal embedding spaces. Through Gaussian Mixture Models combined with residual quantization, RQ-GMM achieves superior codebook utilization and reconstruction accuracy. Experiments on public datasets and online A/B tests on a large-scale short-video platform serving hundreds of millions of users demonstrate substantial improvements: RQ-GMM yields a 1.502% gain in Advertiser Value over strong baselines. The method has been fully deployed, serving daily recommendations for hundreds of millions of users.", "authors": ["Ziye Tong", "Jiahao Liu", "Weimin Zhang", "Hongji Ruan", "Derick Tang", "Zhanpeng Zeng", "Qinsong Zeng", "Peng Zhang", "Tun Lu", "Ning Gu"], "date": "2026-02-13", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.12593v1", "score": 11, "summary": "RQ-GMM addresses the problem of effectively discretizing continuous multimodal embeddings from pre-trained models into semantic categorical features for CTR prediction, where direct embedding incorporation suffers from misaligned optimization objectives and training dynamics mismatches. The method replaces hard clustering with Gaussian Mixture Models combined with residual quantization, enabling soft assignment and probabilistic modeling that better captures the statistical structure of multimodal embedding spaces while achieving superior codebook utilization and reconstruction accuracy. Experiments on public datasets and large-scale online A/B tests on a short-video platform demonstrate RQ-GMM's superiority over baselines, achieving 1.502% improvement in Advertiser Value over RQ-VAE with full production deployment serving hundreds of millions of users."}, {"title": "R2LED: Equipping Retrieval and Refinement in Lifelong User Modeling with Semantic IDs for CTR Prediction", "abstract": "Lifelong user modeling, which leverages users' long-term behavior sequences for CTR prediction, has been widely applied in personalized services. Existing methods generally adopted a two-stage \"retrieval-refinement\" strategy to balance effectiveness and efficiency. However, they still suffer from (i) noisy retrieval due to skewed data distribution and (ii) lack of semantic understanding in refinement. While semantic enhancement, e.g., LLMs modeling or semantic embeddings, offers potential solutions to these two challenges, these approaches face impractical inference costs or insufficient representation granularity. Obsorbing multi-granularity and lightness merits of semantic identity (SID), we propose a novel paradigm that equips retrieval and refinement in Lifelong User Modeling with SEmantic IDs (R2LED) to address these issues. First, we introduce a Multi-route Mixed Retrieval for the retrieval stage. On the one hand, it captures users' interests from various granularities by several parallel recall routes. On the other hand, a mixed retrieval mechanism is proposed to efficiently retrieve candidates from both collaborative and semantic views, reducing noise. Then, for refinement, we design a Bi-level Fusion Refinement, including a target-aware cross-attention for route-level fusion and a gate mechanism for SID-level fusion. It can bridge the gap between semantic and collaborative spaces, exerting the merits of SID. The comprehensive experimental results on two public datasets demonstrate the superiority of our method in both performance and efficiency. To facilitate the reproduction, we have released the code online https://github.com/abananbao/R2LED.", "authors": ["Qidong Liu", "Gengnan Wang", "Zhichen Liu", "Moranxin Wang", "Zijian Zhang", "Xiao Han", "Ni Zhang", "Tao Qin", "Chen Li"], "date": "2026-02-06", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.06622v1", "score": 11, "summary": "R2LED addresses the problem of noise in retrieval and lack of semantic understanding in refinement for CTR prediction with ultra-long user behavior sequences, which existing two-stage retrieval-refinement methods fail to adequately handle despite relying on collaborative signals. The proposed approach integrates Semantic IDs (SIDs) through a Multi-route Mixed Retrieval mechanism that captures user interests at multiple granularities via target, recent, and global routes while reducing noise through combined semantic and collaborative matching, alongside a Bi-level Fusion Refinement that aligns semantic and collaborative spaces through target-aware cross-attention at route and SID levels. Comprehensive experiments on JD and Pixel-1M datasets demonstrate that R2LED achieves superior CTR prediction performance (e.g., 0.8117 AUC on JD) compared to state-of-the-art baselines while maintaining competitive inference efficiency and showing particular improvements on long-tail items."}, {"title": "Distribution-Aware End-to-End Embedding for Streaming Numerical Features in Click-Through Rate Prediction", "abstract": "This paper explores effective numerical feature embedding for Click-Through Rate prediction in streaming environments. Conventional static binning methods rely on offline statistics of numerical distributions; however, this inherently two-stage process often triggers semantic drift during bin boundary updates. While neural embedding methods enable end-to-end learning, they often discard explicit distributional information. Integrating such information end-to-end is challenging because streaming features often violate the i.i.d. assumption, precluding unbiased estimation of the population distribution via the expectation of order statistics. Furthermore, the critical context dependency of numerical distributions is often neglected. To this end, we propose DAES, an end-to-end framework designed to tackle numerical feature embedding in streaming training scenarios by integrating distributional information with an adaptive modulation mechanism. Specifically, we introduce an efficient reservoir-sampling-based distribution estimation method and two field-aware distribution modulation strategies to capture streaming distributions and field-dependent semantics. DAES significantly outperforms existing approaches as demonstrated by extensive offline and online experiments and has been fully deployed on a leading short-video platform with hundreds of millions of daily active users.", "authors": ["Jiahao Liu", "Hongji Ruan", "Weimin Zhang", "Ziye Tong", "Derick Tang", "Zhanpeng Zeng", "Qinsong Zeng", "Peng Zhang", "Tun Lu", "Ning Gu"], "date": "2026-02-03", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.03223v1", "score": 11, "summary": "This paper addresses numerical feature embedding for click-through rate prediction in streaming environments, where conventional static binning methods suffer from semantic drift due to offline bin updates and neural methods overlook distributional information. The authors propose DAES, which combines efficient reservoir sampling with jump optimization for online quantile estimation, encodes features in quantile space rather than value space to preserve density information, and employs field-aware distribution modulation via gating or affine transformations to capture context-dependent semantics. Extensive offline experiments on public benchmarks and large-scale online A/B testing on a production platform demonstrate that DAES consistently outperforms state-of-the-art baselines including interpolated binning methods, achieving a 2.307% increase in average revenue per user while eliminating the need for manual feature engineering."}, {"title": "GRAB: An LLM-Inspired Sequence-First Click-Through Rate Prediction Modeling Paradigm", "abstract": "Traditional Deep Learning Recommendation Models (DLRMs) face increasing bottlenecks in performance and efficiency, often struggling with generalization and long-sequence modeling. Inspired by the scaling success of Large Language Models (LLMs), we propose Generative Ranking for Ads at Baidu (GRAB), an end-to-end generative framework for Click-Through Rate (CTR) prediction. GRAB integrates a novel Causal Action-aware Multi-channel Attention (CamA) mechanism to effectively capture temporal dynamics and specific action signals within user behavior sequences. Full-scale online deployment demonstrates that GRAB significantly outperforms established DLRMs, delivering a 3.05% increase in revenue and a 3.49% rise in CTR. Furthermore, the model demonstrates desirable scaling behavior: its expressive power shows a monotonic and approximately linear improvement as longer interaction sequences are utilized.", "authors": ["Shaopeng Chen", "Chuyue Xie", "Huimin Ren", "Shaozong Zhang", "Han Zhang", "Ruobing Cheng", "Zhiqiang Cao", "Zehao Ju", "Yu Gao", "Jie Ding", "Xiaodong Chen", "Xuewu Jiao", "Shuanglong Li", "Liu Lin"], "date": "2026-02-02", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.01865v2", "score": 11, "summary": "GRAB addresses the challenge of deploying generative recommendation (GR) models for industrial-scale click-through rate (CTR) prediction, where traditional deep learning recommendation models (DLRMs) face bottlenecks in performance and efficiency when handling long user behavior sequences. The paper proposes GRAB, an end-to-end framework combining sparse feature engineering from DLRMs with sequential modeling from GR, featuring a Causal Action-aware Multi-channel Attention (CamA) mechanism and a Sequence-Then-Sparse (STS) two-stage training strategy to mitigate distribution skew from sequence packing. GRAB achieves 0.19% relative improvement over baselines in offline evaluation and demonstrates substantial online gains of 3.49% CTR increase and 3.05% revenue increase in Baidu's production system, with monotonic scaling improvements as sequence length and model capacity increase."}, {"title": "HyFormer: Revisiting the Roles of Sequence Modeling and Feature Interaction in CTR Prediction", "abstract": "Industrial large-scale recommendation models (LRMs) face the challenge of jointly modeling long-range user behavior sequences and heterogeneous non-sequential features under strict efficiency constraints. However, most existing architectures employ a decoupled pipeline: long sequences are first compressed with a query-token based sequence compressor like LONGER, followed by fusion with dense features through token-mixing modules like RankMixer, which thereby limits both the representation capacity and the interaction flexibility. This paper presents HyFormer, a unified hybrid transformer architecture that tightly integrates long-sequence modeling and feature interaction into a single backbone. From the perspective of sequence modeling, we revisit and redesign query tokens in LRMs, and frame the LRM modeling task as an alternating optimization process that integrates two core components: Query Decoding which expands non-sequential features into Global Tokens and performs long sequence decoding over layer-wise key-value representations of long behavioral sequences; and Query Boosting which enhances cross-query and cross-sequence heterogeneous interactions via efficient token mixing. The two complementary mechanisms are performed iteratively to refine semantic representations across layers. Extensive experiments on billion-scale industrial datasets demonstrate that HyFormer consistently outperforms strong LONGER and RankMixer baselines under comparable parameter and FLOPs budgets, while exhibiting superior scaling behavior with increasing parameters and FLOPs. Large-scale online A/B tests in high-traffic production systems further validate its effectiveness, showing significant gains over deployed state-of-the-art models. These results highlight the practicality and scalability of HyFormer as a unified modeling framework for industrial LRMs.", "authors": ["Yunwen Huang", "Shiyong Hong", "Xijun Xiao", "Jinqiu Jin", "Xuanyuan Luo", "Zhe Wang", "Zheng Chai", "Shikang Wu", "Yuchao Zheng", "Jingjian Lin"], "date": "2026-01-19", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2601.12681v2", "score": 11, "summary": "The paper addresses the fundamental limitation that industrial large-scale recommendation models employ a decoupled pipeline where long-sequence modeling and heterogeneous feature interaction are performed sequentially, resulting in compressed late-fusion representations that constrain modeling expressiveness and scaling efficiency. HyFormer proposes a unified hybrid transformer architecture that alternates between Query Decoding (which expands non-sequential features into global tokens and performs cross-attention over long-sequence key-value pairs) and Query Boosting (which enhances interactions via MLP-Mixer-style token mixing), enabling bidirectional information flow between sequence and feature components across stacked layers. Extensive experiments on billion-scale industrial datasets demonstrate that HyFormer achieves 0.17% AUC improvement over strong baselines while using fewer FLOPs (3.9T vs 3.5-21.9T), exhibits superior scaling laws with respect to parameters and computation, and delivers significant online gains (1.111% increase in video finish count, 0.236% decrease in query reformulation rate) in production deployment at ByteDance."}, {"title": "ML-DCN: Masked Low-Rank Deep Crossing Network Towards Scalable Ads Click-through Rate Prediction at Pinterest", "abstract": "Deep learning recommendation systems rely on feature interaction modules to model complex user-item relationships across sparse categorical and dense features. In large-scale ad ranking, increasing model capacity is a promising path to improving both predictive performance and business outcomes, yet production serving budgets impose strict constraints on latency and FLOPs. This creates a central tension: we want interaction modules that both scale effectively with additional compute and remain compute-efficient at serving time. In this work, we study how to scale feature interaction modules under a fixed serving budget. We find that naively scaling DCNv2 and MaskNet, despite their widespread adoption in industry, yields rapidly diminishing offline gains in the Pinterest ads ranking system. To overcome aforementioned limitations, we propose ML-DCN, an interaction module that integrates an instance-conditioned mask into a low-rank crossing layer, enabling per-example selection and amplification of salient interaction directions while maintaining efficient computation. This novel architecture combines the strengths of DCNv2 and MaskNet, scales efficiently with increased compute, and achieves state-of-the-art performance. Experiments on a large internal Pinterest ads dataset show that ML-DCN achieves higher AUC than DCNv2, MaskNet, and recent scaling-oriented alternatives at matched FLOPs, and it scales more favorably overall as compute increases, exhibiting a stronger AUC-FLOPs trade-off. Finally, online A/B tests demonstrate statistically significant improvements in key ads metrics (including CTR and click-quality measures) and ML-DCN has been deployed in the production system with neutral serving cost.", "authors": ["Jiacheng Li", "Yixiong Meng", "Yi wu", "Yun Zhao", "Sharare Zehtabian", "Jiayin Jin", "Degao Peng", "Jinfeng Zhuang", "Qifei Shen", "Kungang Li"], "date": "2026-02-09", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.09194v1", "score": 10, "summary": "ML-DCN addresses the challenge of scaling feature interaction modules in ads CTR prediction under strict serving budget constraints, where existing methods like DCNv2 and MaskNet exhibit rapidly diminishing returns. The authors propose ML-DCN, which integrates instance-conditioned masking into a low-rank crossing layer to dynamically select and amplify salient interaction directions while maintaining computational efficiency, achieving a maximum interaction order of 2^l+1 − 1 compared to DCNv2's l+1. Offline experiments on Pinterest's ads dataset demonstrate that ML-DCN achieves superior AUC-FLOPs trade-offs compared to DCNv2, MaskNet, WuKong, and RankMixer, with online A/B tests validating a +1.89% relative increase in platform-wide CTR at neutral serving cost, and the model has been deployed in production."}, {"title": "Length-Adaptive Interest Network for Balancing Long and Short Sequence Modeling in CTR Prediction", "abstract": "User behavior sequences in modern recommendation systems exhibit significant length heterogeneity, ranging from sparse short-term interactions to rich long-term histories. While longer sequences provide more context, we observe that increasing the maximum input sequence length in existing CTR models paradoxically degrades performance for short-sequence users due to attention polarization and length imbalance in training data. To address this, we propose LAIN(Length-Adaptive Interest Network), a plug-and-play framework that explicitly incorporates sequence length as a conditioning signal to balance long- and short-sequence modeling. LAIN consists of three lightweight components: a Spectral Length Encoder that maps length into continuous representations, Length-Conditioned Prompting that injects global contextual cues into both long- and short-term behavior branches, and Length-Modulated Attention that adaptively adjusts attention sharpness based on sequence length. Extensive experiments on three real-world benchmarks across five strong CTR backbones show that LAIN consistently improves overall performance, achieving up to 1.15% AUC gain and 2.25% log loss reduction. Notably, our method significantly improves accuracy for short-sequence users without sacrificing longsequence effectiveness. Our work offers a general, efficient, and deployable solution to mitigate length-induced bias in sequential recommendation.", "authors": ["Zhicheng Zhang", "Zhaocheng Du", "Jieming Zhu", "Jiwei Tang", "Fengyuan Lu", "Wang Jiaheng", "Song-Li Wu", "Qianhui Zhu", "Jingyu Li", "Hai-Tao Zheng", "Zhenhua Dong"], "date": "2026-01-27", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2601.19142v1", "score": 10, "summary": "This paper identifies a critical performance imbalance in CTR prediction models where increasing maximum sequence length improves accuracy for long-history users but degrades it for short-history users—a problem driven by attention polarization and the failure to condition on sequence length as a modeling signal. LAIN addresses this through three lightweight components: a Spectral Length Encoder that embeds raw sequence length via Fourier features, Length-Conditioned Prompting that injects length-aware tokens into behavior sequences, and Length-Modulated Attention that dynamically adjusts softmax temperature and query-key representations based on length. Extensive experiments across five CTR backbones and three datasets demonstrate consistent improvements with up to 1.15% AUC gain overall and notably +1.08% AUC improvement for short-sequence users (<100 items) with only 1.5% additional parameters and 2.3% inference overhead."}, {"title": "Relevance Matters: A Multi-Task and Multi-Stage Large Language Model Approach for E-commerce Query Rewriting", "abstract": "For e-commerce search, user experience is measured by users' behavioral responses to returned products, like click-through rate and conversion rate, as well as the relevance between returned products and search queries. Consequently, relevance and user conversion constitute the two primary objectives in query rewriting, a strategy to bridge the lexical gap between user expressions and product descriptions. This research proposes a multi-task and multi-stage query rewriting framework grounded in large language models (LLMs). Critically, in contrast to previous works that primarily emphasized rewritten query generation, we inject the relevance task into query rewriting. Specifically, leveraging a pretrained model on user data and product information from JD.com, the approach initiates with multi-task supervised fine-tuning (SFT) comprising of the rewritten query generation task and the relevance tagging task between queries and rewrites. Subsequently, we employ Group Relative Policy Optimization (GRPO) for the model's objective alignment oriented toward enhancing the relevance and stimulating user conversions. Through offline evaluation and online A/B test, our framework illustrates substantial improvements in the effectiveness of e-commerce query rewriting, resulting in elevating the search results' relevance and boosting the number of purchases made per user (UCVR). Since August 2025, our approach has been implemented on JD.com, one of China's leading online shopping platforms.", "authors": ["Aijun Dai", "Jixiang Zhang", "Haiqing Hu", "Guoyu Tang", "Lin Liu", "Ziguang Cheng"], "date": "2026-03-03", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2603.02555v1", "score": 9, "summary": "The paper proposes a multi-task and multi-stage LLM framework for e-commerce query rewriting that jointly optimizes rewrite generation with relevance tag prediction, addressing the overlooked importance of relevance in existing query rewriting methods. The approach combines multi-task supervised fine-tuning (SFT) that generates both rewrites and relevance tags, followed by Group Relative Policy Optimization (GRPO) with a composite reward function integrating relevance, productivity, increment, and rule-based components to align the LLM toward higher relevance and user conversion. Comprehensive offline experiments and online A/B testing on JD.com demonstrate substantial improvements, with the framework achieving +0.181% user conversion rate (UCVR), +0.106% unique visitor value, and +0.082% click-through rate (UCTR) gains over the previous-generation system."}, {"title": "MaRI: Accelerating Ranking Model Inference via Structural Re-parameterization in Large Scale Recommendation System", "abstract": "Ranking models, i.e., coarse-ranking and fine-ranking models, serve as core components in large-scale recommendation systems, responsible for scoring massive item candidates based on user preferences. To meet the stringent latency requirements of online serving, structural lightweighting or knowledge distillation techniques are commonly employed for ranking model acceleration. However, these approaches typically lead to a non-negligible drop in accuracy. Notably, the angle of lossless acceleration by optimizing feature fusion matrix multiplication, particularly through structural reparameterization, remains underexplored. In this paper, we propose MaRI, a novel Matrix Re-parameterized Inference framework, which serves as a complementary approach to existing techniques while accelerating ranking model inference without any accuracy loss. MaRI is motivated by the observation that user-side computation is redundant in feature fusion matrix multiplication, and we therefore adopt the philosophy of structural reparameterization to alleviate such redundancy.", "authors": ["Yusheng Huang", "Pengbo Xu", "Shen Wang", "Changxin Lao", "Jiangxia Cao", "Shuang Wen", "Shuang Yang", "Zhaojie Liu", "Han Li", "Kun Gai"], "date": "2026-02-26", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.23105v1", "score": 9, "summary": ""}, {"title": "Generative Pseudo-Labeling for Pre-Ranking with LLMs", "abstract": "Pre-ranking is a critical stage in industrial recommendation systems, tasked with efficiently scoring thousands of recalled items for downstream ranking. A key challenge is the train-serving discrepancy: pre-ranking models are trained only on exposed interactions, yet must score all recalled candidates -- including unexposed items -- during online serving. This mismatch not only induces severe sample selection bias but also degrades generalization, especially for long-tail content. Existing debiasing approaches typically rely on heuristics (e.g., negative sampling) or distillation from biased rankers, which either mislabel plausible unexposed items as negatives or propagate exposure bias into pseudo-labels. In this work, we propose Generative Pseudo-Labeling (GPL), a framework that leverages large language models (LLMs) to generate unbiased, content-aware pseudo-labels for unexposed items, explicitly aligning the training distribution with the online serving space. By offline generating user-specific interest anchors and matching them with candidates in a frozen semantic space, GPL provides high-quality supervision without adding online latency. Deployed in a large-scale production system, GPL improves click-through rate by 3.07%, while significantly enhancing recommendation diversity and long-tail item discovery.", "authors": ["Junyu Bi", "Xinting Niu", "Daixuan Cheng", "Kun Yuan", "Tao Wang", "Binbin Cao", "Jian Wu", "Yuning Jiang"], "date": "2026-02-24", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.20995v1", "score": 9, "summary": ""}, {"title": "CaliCausalRank: Calibrated Multi-Objective Ad Ranking with Robust Counterfactual Utility Optimization", "abstract": "Ad ranking systems must simultaneously optimize multiple objectives including click-through rate (CTR), conversion rate (CVR), revenue, and user experience metrics. However, production systems face critical challenges: score scale inconsistency across traffic segments undermines threshold transferability, and position bias in click logs causes offline-online metric discrepancies. We propose CaliCausalRank, a unified framework that integrates training-time scale calibration, constraint-based multi-objective optimization, and robust counterfactual utility estimation. Our approach treats score calibration as a first-class training objective rather than post-hoc processing, employs Lagrangian relaxation for constraint satisfaction, and utilizes variance-reduced counterfactual estimators for reliable offline evaluation. Experiments on the Criteo and Avazu datasets demonstrate that CaliCausalRank achieves 1.1% relative AUC improvement, 31.6% calibration error reduction, and 3.2% utility gain compared to the best baseline (PairRank) while maintaining consistent performance across different traffic segments.", "authors": ["Xikai Yang", "Sebastian Sun", "Yilin Li", "Yue Xing", "Ming Wang", "Yang Wang"], "date": "2026-02-21", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.18786v1", "score": 9, "summary": ""}, {"title": "DAIAN: Deep Adaptive Intent-Aware Network for CTR Prediction in Trigger-Induced Recommendation", "abstract": "Recommendation systems are essential for personalizing e-commerce shopping experiences. Among these, Trigger-Induced Recommendation (TIR) has emerged as a key scenario, which utilizes a trigger item (explicitly represents a user's instantaneous interest), enabling precise, real-time recommendations. Although several trigger-based techniques have been proposed, most of them struggle to address the intent myopia issue, that is, a recommendation system overemphasizes the role of trigger items and narrowly focuses on suggesting commodities that are highly relevant to trigger items. Meanwhile, existing methods rely on collaborative behavior patterns between trigger and recommended items to identify the user's preferences, yet the sparsity of ID-based interaction restricts their effectiveness. To this end, we propose the Deep Adaptive Intent-Aware Network (DAIAN) that dynamically adapts to users' intent preferences. In general, we first extract the users' personalized intent representations by analyzing the correlation between a user's click and the trigger item, and accordingly retrieve the user's related historical behaviors to mine the user's diverse intent. Besides, sparse collaborative behaviors constrain the performance in capturing items associated with user intent. Hence, we reinforce similarity by leveraging a hybrid enhancer with ID and semantic information, followed by adaptive selection based on varying intents. Experimental results on public datasets and our industrial e-commerce datasets demonstrate the effectiveness of DAIAN.", "authors": ["Zhihao Lv", "Longtao Zhang", "Ailong He", "Shuzhi Cao", "Shuguang Han", "Jufeng Chen"], "date": "2026-02-15", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.13971v1", "score": 9, "summary": ""}, {"title": "RELATE: A Reinforcement Learning-Enhanced LLM Framework for Advertising Text Generation", "abstract": "In online advertising, advertising text plays a critical role in attracting user engagement and driving advertiser value. Existing industrial systems typically follow a two-stage paradigm, where candidate texts are first generated and subsequently aligned with online performance metrics such as click-through rate(CTR). This separation often leads to misaligned optimization objectives and low funnel efficiency, limiting global optimality.   To address these limitations, we propose RELATE, a reinforcement learning-based end-to-end framework that unifies generation and objective alignment within a single model. Instead of decoupling text generation from downstream metric alignment, RELATE integrates performance and compliance objectives directly into the generation process via policy learning. To better capture ultimate advertiser value beyond click-level signals, We incorporate conversion-oriented metrics into the objective and jointly model them with compliance constraints as multi-dimensional rewards, enabling the model to generate high-quality ad texts that improve conversion performance under policy constraints.   Extensive experiments on large-scale industrial datasets demonstrate that RELATE consistently outperforms baselines. Furthermore, online deployment on a production advertising platform yields statistically significant improvements in click-through conversion rate(CTCVR) under strict policy constraints, validating the robustness and real-world effectiveness of the proposed framework.", "authors": ["Jinfang Wang", "Jiajie Liu", "Jianwei Wu", "Ziqin Luo", "Zhen Chen", "Chunlei Li", "Biao Han", "Tao Deng", "Yi Li", "Shuanglong Li", "Lin Liu"], "date": "2026-02-12", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.11780v1", "score": 9, "summary": ""}, {"title": "Unleashing the Potential of Sparse Attention on Long-term Behaviors for CTR Prediction", "abstract": "In recent years, the success of large language models (LLMs) has driven the exploration of scaling laws in recommender systems. However, models that demonstrate scaling laws are actually challenging to deploy in industrial settings for modeling long sequences of user behaviors, due to the high computational complexity of the standard self-attention mechanism. Despite various sparse self-attention mechanisms proposed in other fields, they are not fully suited for recommendation scenarios. This is because user behaviors exhibit personalization and temporal characteristics: different users have distinct behavior patterns, and these patterns change over time, with data from these users differing significantly from data in other fields in terms of distribution. To address these challenges, we propose SparseCTR, an efficient and effective model specifically designed for long-term behaviors of users. To be precise, we first segment behavior sequences into chunks in a personalized manner to avoid separating continuous behaviors and enable parallel processing of sequences. Based on these chunks, we propose a three-branch sparse self-attention mechanism to jointly identify users' global interests, interest transitions, and short-term interests. Furthermore, we design a composite relative temporal encoding via learnable, head-specific bias coefficients, better capturing sequential and periodic relationships among user behaviors. Extensive experimental results show that SparseCTR not only improves efficiency but also outperforms state-of-the-art methods. More importantly, it exhibits an obvious scaling law phenomenon, maintaining performance improvements across three orders of magnitude in FLOPs. In online A/B testing, SparseCTR increased CTR by 1.72\\% and CPM by 1.41\\%. Our source code is available at https://github.com/laiweijiang/SparseCTR.", "authors": ["Weijiang Lai", "Beihong Jin", "Di Zhang", "Siru Chen", "Jiongyan Zhang", "Yuhang Gou", "Jian Dong", "Xingxing Wang"], "date": "2026-01-25", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2601.17836v1", "score": 9, "summary": ""}, {"title": "MLPlatt: Simple Calibration Framework for Ranking Models", "abstract": "Ranking models are extensively used in e-commerce for relevance estimation. These models often suffer from poor interpretability and no scale calibration, particularly when trained with typical ranking loss functions. This paper addresses the problem of post-hoc calibration of ranking models. We introduce MLPlatt: a simple yet effective ranking model calibration method that preserves the item ordering and converts ranker outputs to interpretable click-through rate (CTR) probabilities usable in downstream tasks. The method is context-aware by design and achieves good calibration metrics globally, and within strata corresponding to different values of a selected categorical field (such as user country or device), which is often important from a business perspective of an E-commerce platform. We demonstrate the superiority of MLPlatt over existing approaches on two datasets, achieving an improvement of over 10\\% in F-ECE (Field Expected Calibration Error) compared to other methods. Most importantly, we show that high-quality calibration can be achieved without compromising the ranking quality.", "authors": ["Piotr Bajger", "Roman Dusek", "Krzysztof Galias", "Paweł Młyniec", "Aleksander Wawer", "Paweł Zawistowski"], "date": "2026-01-13", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2601.08345v1", "score": 9, "summary": ""}, {"title": "tensorFM: Low-Rank Approximations of Cross-Order Feature Interactions", "abstract": "We address prediction problems on tabular categorical data, where each instance is defined by multiple categorical attributes, each taking values from a finite set. These attributes are often referred to as fields, and their categorical values as features. Such problems frequently arise in practical applications, including click-through rate prediction and social sciences. We introduce and analyze {tensorFM}, a new model that efficiently captures high-order interactions between attributes via a low-rank tensor approximation representing the strength of these interactions. Our model generalizes field-weighted factorization machines. Empirically, tensorFM demonstrates competitive performance with state-of-the-art methods. Additionally, its low latency makes it well-suited for time-sensitive applications, such as online advertising.", "authors": ["Alessio Mazzetto", "Mohammad Mahdi Khalili", "Laura Fee Nern", "Michael Viderman", "Alex Shtoff", "Krzysztof Dembczyński"], "date": "2026-02-16", "year": 2026, "venue": "arXiv", "source": "arxiv", "url": "https://arxiv.org/abs/2602.15229v1", "score": 8, "summary": ""}, {"title": "Query-Mixed Interest Extraction and Heterogeneous Interaction: A Scalable CTR Model for Industrial Recommender Systems", "abstract": "Learning effective feature interactions is central to modern recommender systems, yet remains challenging in industrial settings due to sparse multi-field inputs and ultra-long user behavior sequences. While recent scaling efforts have improved model capacity, they often fail to construct both context-aware and context-independent user intent from the long-term and real-time behavior sequence. Meanwhile, recent work also suffers from inefficient and homogeneous interaction mechanisms, leading to suboptimal prediction performance. To address these limitations, we propose HeMix, a scalable ranking model that unifies adaptive sequence tokenization and heterogeneous interaction structure. Specifically, HeMix introduces a Query-Mixed Interest Extraction module that jointly models context-aware and context-independent user interests via dynamic and fixed queries over global and real-time behavior sequences. For interaction, we replace self-attention with the HeteroMixer block, enabling efficient, multi-granularity cross-feature interactions that adopt the multi-head token fusion, heterogeneous interaction and group-aligned reconstruction pipelines. HeMix demonstrates favorable scaling behavior, driven by the HeteroMixer block, where increasi
